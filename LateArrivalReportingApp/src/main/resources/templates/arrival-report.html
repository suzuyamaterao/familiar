<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>到着報告</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/arrivalReport.css" />
</head>

<body>
    <header>到着報告</header>

    <main class="form-container">

        <form id="train-tab" th:action="@{/submit-train-delay}" method="post">

            <div th:if="${existence}" class="delay-input" style="color:#c33; font-weight:bold;">
                まだ遅刻報告が提出されていません。
            </div>

            <div th:if="${already}" style="color:#c33; font-weight:bold;">
                本日の到着報告はすでに提出されています。
            </div>

            <!-- 間に合ったチェック -->
            <div class="arrival-time">
                <label class="time-label">
                    <span class="label-text"> </span>
                </label>
                <div class="time-fields">
                    <label class="checkbox-label">
                        <input type="checkbox" id="on_time" name="on_time" value="true">
                        <span>
                            間に合ったら、チェック
                        </span>
                    </label>
                </div>
            </div>


            <!-- 電車遅延表示 -->
            <div class="arrival-time" th:if="${trainLabel != null}">
                <label class="time-label">
                    <span class="label-text" th:text="${trainLabel}">遅延時間:</span>
                </label>
                <div class="time-fields">
                    <input type="number" id="train_delay_time" name="train_delay_time" min="0" max="999" required /> 分
                </div>
                <input type="hidden" id="train_id" name="train_id" th:value="${trainId}" />
            </div>


            <!-- 到着時間 -->
            <div class="arrival-time">
                <label class="time-label">
                    <span class="label-text">到着時間:</span>
                </label>
                <div>
                    <select id="arrivalHour" class="arrival-select"></select> 時
                    <select id="arrivalMinute" class="arrival-select"></select> 分
                    <input type="hidden" id="arrival_time" name="arrival_time" />
                </div>
            </div>

            <!-- 遅刻時間 -->
            <div class="arrival-time">
                <label class="time-label">
                    <span class="label-text">遅刻時間:</span>
                </label>
                <div>
                    <select id="lateHour" class="arrival-select"></select> 時
                    <select id="lateMinute" class="arrival-select"></select> 分
                    <input type="hidden" id="late_time" name="late_time" />
                </div>
            </div>

            <!-- 連絡事項 -->
            <div class="other-reason">
                <label class="time-label">連絡事項:</label>
                <textarea name="reason" rows="4" cols="40" placeholder="連絡事項があれば（任意）"></textarea>
            </div>

            <div class="submit-section">
                <button type="submit">送信</button>
            </div>

        </form>

    </main>

    <footer>&copy; 2026 遅刻報告アプリ</footer>

    <script>
    (function () {

        function pad(n) {
            return String(n).padStart(2, "0");
        }

        function updateHidden() {

            const ah = document.getElementById("arrivalHour").value || "00";
            const am = document.getElementById("arrivalMinute").value || "00";

            const lh = document.getElementById("lateHour").value || "00";
            const lm = document.getElementById("lateMinute").value || "00";

            document.getElementById("arrival_time").value = ah + ":" + am;
            document.getElementById("late_time").value = lh + ":" + lm;
        }

        function fillSelect(hourId, minuteId) {

            const hourSel = document.getElementById(hourId);
            const minSel = document.getElementById(minuteId);

            for (let h = 0; h < 24; h++) {
                hourSel.add(new Option(pad(h), pad(h)));
            }

            for (let m = 0; m < 60; m++) {
                minSel.add(new Option(pad(m), pad(m)));
            }

            const now = new Date();

            hourSel.value = pad(now.getHours());
            minSel.value = pad(now.getMinutes());

            hourSel.addEventListener("change", updateHidden);
            minSel.addEventListener("change", updateHidden);
        }

        function toggleDisable() {

            const onTime = document.getElementById("on_time").checked;

            const fields = [
                "arrivalHour",
                "arrivalMinute",
                "lateHour",
                "lateMinute"
            ];

            fields.forEach(id => {
                const el = document.getElementById(id);
                el.disabled = onTime;
                if (onTime) el.value = "";
            });

            const delay = document.getElementById("train_delay_time");

            if (delay) {
                delay.disabled = onTime;
                delay.required = !onTime;

                if (onTime) delay.value = "";
            }

            if (onTime) {
                document.getElementById("arrival_time").value = "";
                document.getElementById("late_time").value = "";
            } else {
                updateHidden();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {

            fillSelect("arrivalHour", "arrivalMinute");
            fillSelect("lateHour", "lateMinute");

            updateHidden();

            const check = document.getElementById("on_time");
            check.addEventListener("change", toggleDisable);

        });

    })();
    </script>
</body>

</html>
