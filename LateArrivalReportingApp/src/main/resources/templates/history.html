<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照会画面</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/history.css" />
</head>

<body>
  <header>照会</header>

  <main class="inquiry-container">

    <!-- 上部情報 -->
    <div class="user-info">
      <span th:text="'ログイン名：' + ${empLname} + ' ' + ${empFname}"></span>
      <button type="button" class="csv-button" id="csvBtn">CSVダウンロード</button>
    </div>

    
    <!-- 検索条件フォーム -->
    <form class="search-form" action="/search" method="get">
      <div class="form-row">
        <label>期間：
          <input type="date" name="startDate" th:value="${startDate}" />
          ～
          <input type="date" name="endDate" th:value="${endDate}" />
        </label>
      </div>

      <div class="form-row">
        <label>ユニット：
          <select id="unitSelect">
            <option value="">選択してください</option>
            <option th:each="unit : ${units}"
                    th:value="${unit.codeId}"
                    th:text="${unit.codeName}"
                    th:selected="${unit.codeId == selectedUnit}">
            </option>
          </select>
          <input type="hidden" name="units" id="unitHidden">
        </label>

        <label>チーム：
          <select id="teamSelect">
            <option value="">選択してください</option>
            <option th:each="team : ${teams}"
                th:value="${team.teamId}"
                th:text="${team.teamName}"
                th:selected="${team.teamId == selectedTeam}">
            </option>
          </select>
          <input type="hidden" name="teams" id="teamHidden">
        </label>
        <label>名前：
          <select id="employeeSelect">
            <option value="">選択してください</option>
            <option th:each="employee : ${employees}"
                    th:value="${employee.empId}"
                    th:text="|${employee.empLname} ${employee.empFname}|"
                    th:selected="${employee.empId == selectedName}">
            </option>
          </select>
          <input type="hidden" name="name" id="nameHidden">
        </label>
      </div>
      <div class="form-row right-align">
        <button type="submit" class="search-btn">検索</button>
      </div>
    </form>

    <!-- 検索結果表示エリア -->
    <div class="result-area">
      <h2>検索結果</h2>
      <p>ここに検索結果が表示されます。</p>
      <table border="1">
        <tr>
          <th>遅刻有無</th>         
          <th>日付</th>
          <th>名前</th>
          <th>理由</th>
          <th>遅刻時間</th>
          <th>到着時間</th>
          <th>路線</th>
          <th>遅延分</th>
          <th>連絡時コメント</th>
          <th>到着時コメント</th>
        </tr>
        <tr th:each="item : ${results}">
          <td th:text="${item.lateUmuNm}"></td>
          <td th:text="${item.contactDate}"></td>
          <td th:text="${item.name}"></td>
          <td th:text="${item.reasonNm}"></td>
          <td th:text="${item.lateTime}"></td>
          <td th:text="${item.arriveTime}"></td> 
          <td th:text="${item.railway}"></td>
          <td th:text="${item.delay}"></td>
          <td th:text="${item.lateInformation}"></td>
          <td th:text="${item.arrInformation}"></td>
        </tr>
      </table>
    </div>

  </main>

  <footer>&copy; 2026 遅刻報告アプリ</footer>
  <script>
    // サーバーから渡された値をJavaScript変数に設定
    const rolesId = '[[${rolesId}]]';
    const currentUnitNo = '[[${currentUnitNo}]]';
    const currentTeamId = '[[${currentTeamId}]]';
    const currentEmpId = '[[${currentEmpId}]]';
  </script>
  <script src="js/history-filter.js?v=3"></script>
</body>

</html>
