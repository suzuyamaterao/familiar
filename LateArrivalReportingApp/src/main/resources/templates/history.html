<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照会画面</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/history.css" />
</head>

<body>
  <header>照会</header>

  <main class="inquiry-container">

    <!-- 上部情報 -->
    <div class="user-info">
      <span th:text="'ログイン名：' + ${empLname} + ' ' + ${empFname}"></span>
      <button class="csv-button">CSVダウンロード</button>
    </div>

    <!-- 検索条件フォーム -->
    <form class="search-form">
      <div class="form-row">
        <label>ユニット：
          <select name="units">
            <option value="">選択してください</option>
            <option th:each="unit : ${units}" th:value="${unit.codeId}" th:text="${unit.codeName}"></option>
          </select>
        </label>

        <label>チーム：
          <select name="teams">
            <option value="">選択してください</option>
            <option th:each="team : ${teams}" th:value="${team.teamId}" th:text="${team.teamName}"></option>
          </select>
        </label>
        <label>名前：
          <select name="name">
            <option value="">選択してください</option>
            <option th:each="employee : ${employees}" th:value="${employee.empId}"
              th:text="|${employee.empLname} ${employee.empFname}|"></option>
          </select>
        </label>
      </div>
      <div class="form-row right-align">
        <button type="button" class="detail-btn">詳細条件設定</button>
        <button type="submit" class="search-btn">検索</button>
      </div>
    </form>

    <!-- 検索結果表示エリア -->
    <div class="result-area">
      <h2>検索結果</h2>
      <p>ここに検索結果が表示されます。</p>
      <!-- 実際にはテーブルなど -->
    </div>

  </main>

  <footer>&copy; 2026 遅刻報告アプリ</footer>
</body>

</html>
