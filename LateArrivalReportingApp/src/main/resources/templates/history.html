<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照会画面</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/history.css" />
</head>

<body>
  <header>照会</header>

  <main class="inquiry-container">

    <!-- 上部情報 -->
    <div class="user-info">
      <span th:text="'ログイン名：' + ${empLname} + ' ' + ${empFname}"></span>
      <div class="download-buttons">
        <button type="button" class="csv-button" id="csvBtn">CSVダウンロード</button>
        <button type="button" class="excel-button" id="excelBtn">Excelダウンロード</button>
      </div>
    </div>


    <!-- 検索条件フォーム -->
    <form class="search-form" action="/search" method="get">
      <div class="form-row">
        <label>期間：
          <input type="date" name="startDate" th:value="${startDate}" />
          ～
          <input type="date" name="endDate" th:value="${endDate}" />
        </label>
      </div>

      <div class="form-row">
        <label>ユニット：
          <select id="unitSelect">
            <option value="">選択してください</option>
            <option th:each="unit : ${units}" th:value="${unit.codeId}" th:text="${unit.codeName}"
              th:selected="${unit.codeId == selectedUnit}">
            </option>
          </select>
          <input type="hidden" name="units" id="unitHidden">
        </label>

        <label>チーム：
          <select id="teamSelect">
            <option value="">選択してください</option>
            <option th:each="team : ${teams}" th:value="${team.teamId}" th:text="${team.teamName}"
              th:selected="${team.teamId == selectedTeam}">
            </option>
          </select>
          <input type="hidden" name="teams" id="teamHidden">
        </label>
        <label>名前：
          <select id="employeeSelect">
            <option value="">選択してください</option>
            <option th:each="employee : ${employees}" th:value="${employee.empId}"
              th:text="|${employee.empLname} ${employee.empFname}|" th:selected="${employee.empId == selectedName}">
            </option>
          </select>
          <input type="hidden" name="name" id="nameHidden">
        </label>
      </div>
      <div class="form-row right-align">
        <button type="submit" class="search-btn">検索</button>
      </div>
    </form>

    <!-- 検索結果表示エリア -->
    <div class="result-area">
      <h2>検索結果</h2>

      <!-- 検索条件表示 -->
      <div class="search-conditions"
        th:if="${startDate != null and startDate != '' or endDate != null and endDate != '' or selectedUnitName != null and selectedUnitName != '' or selectedTeamName != null and selectedTeamName != '' or selectedEmployeeName != null and selectedEmployeeName != ''}"
        style="margin-bottom: 20px; padding: 10px; background-color: #f0f0f0; border-radius: 5px;">
        <strong>検索条件：</strong>
        <span th:if="${startDate != null and startDate != '' or endDate != null and endDate != ''}">
          期間： <span th:text="${startDate != null and startDate != '' ? startDate : '未指定'}"></span> ～ <span
            th:text="${endDate != null and endDate != '' ? endDate : '未指定'}"></span>
        </span>
        <span th:if="${selectedUnitName != null and selectedUnitName != ''}">
          <span th:if="${startDate != null and startDate != '' or endDate != null and endDate != ''}">、</span>ユニット：
          <span th:text="${selectedUnitName}"></span>
        </span>
        <span th:if="${selectedTeamName != null and selectedTeamName != ''}">
          <span
            th:if="${startDate != null and startDate != '' or endDate != null and endDate != '' or selectedUnitName != null and selectedUnitName != ''}">、</span>チーム：
          <span th:text="${selectedTeamName}"></span>
        </span>
        <span th:if="${selectedEmployeeName != null and selectedEmployeeName != ''}">
          <span
            th:if="${startDate != null and startDate != '' or endDate != null and endDate != '' or selectedUnitName != null and selectedUnitName != '' or selectedTeamName != null and selectedTeamName != ''}">、</span>名前：
          <span th:text="${selectedEmployeeName}"></span>
        </span>
      </div>

      <!-- データなし -->
      <p th:if="${#lists.isEmpty(results)}" class="no-data">
        該当するデータはありません。
      </p>
      <!-- データあり -->
      <div class="table-wrapper" th:if="${!#lists.isEmpty(results)}">
        <table class="result-table">
          <tr>
            <th>遅刻有無</th>
            <th>日付</th>
            <th>名前</th>
            <th>理由</th>
            <th>遅刻時間</th>
            <th>到着時間</th>
            <th>路線</th>
            <th>遅延分</th>
            <th>連絡時コメント</th>
            <th>到着時コメント</th>
          </tr>
          <tr th:each="item : ${results}">
            <td th:text="${item.lateUmuNm}"></td>
            <td th:text="${#strings.substring(item.contactDate,0,4) + '/' 
              + #strings.substring(item.contactDate,4,6) + '/' 
              + #strings.substring(item.contactDate,6,8)}"></td>
            <td th:text="${item.name}"></td>
            <td th:text="${item.reasonNm}"></td>
            <td th:text="${item.lateTime != null ?
              (
                item.lateTime.length() == 4 ?
                (
                  #strings.substring(item.lateTime,0,2) == '00' ?
                    T(java.lang.Integer).parseInt(#strings.substring(item.lateTime,2,4)) + '分'
                  :
                    T(java.lang.Integer).parseInt(#strings.substring(item.lateTime,0,2)) + '時間' +
                    T(java.lang.Integer).parseInt(#strings.substring(item.lateTime,2,4)) + '分'
                )
                : item.lateTime
              )
              : ''}">
            </td>
            <td
              th:text="${item.arriveTime != null ? (item.arriveTime.contains(':') ? #strings.replace(item.arriveTime, ':', '：') : (item.arriveTime.length() == 4 ? #strings.substring(item.arriveTime,0,2) + '：' + #strings.substring(item.arriveTime,2,4) : item.arriveTime)) : ''}">
            </td>
            <td th:text="${item.railway}"></td>
            <td th:text="${item.delay}"></td>
            <td th:text="${item.lateInformation}"></td>
            <td th:text="${item.arrInformation}"></td>
          </tr>
        </table>
      </div>
    </div>
  </main>

  <footer>&copy; 2026 遅刻報告アプリ</footer>
  <script>
    // サーバーから渡された値をJavaScript変数に設定
    const rolesId = '[[${rolesId}]]';
    const currentUnitNo = '[[${currentUnitNo}]]';
    const currentTeamId = '[[${currentTeamId}]]';
    const currentEmpId = '[[${currentEmpId}]]';
  </script>
  <script src="js/history-filter.js?v=3"></script>
</body>

</html>
